syntax = "proto3";

package sidecar.v1;

option go_package = "github.com/stablepay/mpc-sidecar/gen/sidecar/v1;sidecarv1";

service P2PTransport {
  rpc SendMessage(P2PMessage) returns (P2PAck);
}

message P2PMessage {
  string ceremony_id = 1;
  int32 from_party_id = 2;
  int32 to_party_id = 3;
  bytes payload = 4;
  bool is_broadcast = 5;
}

message P2PAck {
  bool accepted = 1;
}
