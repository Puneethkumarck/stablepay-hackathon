<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Inputs</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface-1); display:flex; flex-direction: column; gap: 14px; max-width: 480px; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  label { font-family: var(--font-sans); font-size: 13px; font-weight: 500; color: var(--fg-2); }
  .input { font-family: var(--font-sans); background: var(--surface-2); border: 1px solid var(--border-2); color: var(--fg-1); padding: 12px 14px; border-radius: var(--radius-md); font-size: 15px; outline: none; }
  .input:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
  .input.amount { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-size: 28px; font-weight: 600; text-align: right; padding: 18px 16px;}
  .input.err { border-color: var(--danger); }
  .hint { font-size: 12px; color: var(--fg-3); }
  .hint.err { color: var(--danger); }
</style>
</head>
<body>
<div class="field">
  <label>Amount</label>
  <input class="input amount" value="$100.00" readonly>
  <span class="hint">≈ ₹8,450.00 at 84.50 INR / USD</span>
</div>
<div class="field">
  <label>Recipient phone</label>
  <input class="input" value="+91 98765 43210">
</div>
<div class="field">
  <label>UPI ID</label>
  <input class="input err" value="raj@upi.">
  <span class="hint err">Not a valid UPI handle</span>
</div>
</body>
</html>
