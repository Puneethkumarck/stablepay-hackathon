<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Background — hero glow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 0; background: var(--surface-1); height: 240px; position: relative; overflow: hidden; }
  .grid-tex { position: absolute; inset: 0; background-image: radial-gradient(circle, rgba(255,255,255,0.06) 1px, transparent 1px); background-size: 24px 24px; }
  .glow1 { position: absolute; width: 360px; height: 360px; border-radius: 50%; background: radial-gradient(circle, rgba(153,69,255,0.45), transparent 70%); filter: blur(60px); left: -80px; top: -80px; }
  .glow2 { position: absolute; width: 300px; height: 300px; border-radius: 50%; background: radial-gradient(circle, rgba(0,255,163,0.28), transparent 70%); filter: blur(60px); right: -40px; bottom: -80px; }
  .content { position: relative; z-index: 2; padding: 40px; color: var(--fg-1); }
  .content h1 { font-family: var(--font-sans); font-size: 40px; font-weight: 700; letter-spacing: -0.03em; margin: 0 0 10px; line-height: 1.05; }
  .content .pay { background: var(--solana-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  .content p { font-size: 15px; color: var(--fg-2); max-width: 440px; margin: 0; }
</style>
</head>
<body>
<div class="grid-tex"></div>
<div class="glow1"></div>
<div class="glow2"></div>
<div class="content">
  <h1>Send money home in <span class="pay">under a minute</span>.</h1>
  <p>Dotted-grid texture (4% white, 24px), dual radial glows in Solana purple + teal. Used once per page max.</p>
</div>
</body>
</html>
