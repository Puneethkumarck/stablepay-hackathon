<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Card anatomy</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface-1); display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .card { background: var(--surface-2); border: 1px solid var(--border-1); border-radius: var(--radius-lg); padding: 20px; }
  .card.highlight { position: relative; border: 0; background:
    linear-gradient(var(--surface-2), var(--surface-2)) padding-box,
    var(--solana-gradient) border-box;
    border: 1.5px solid transparent;
    box-shadow: var(--glow-solana-soft);
  }
  .eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 8px; }
  h4 { color: var(--fg-1); margin: 0 0 6px; font-size: 18px; font-weight: 600; }
  p { color: var(--fg-2); font-size: 13px; margin: 0; }
</style>
</head>
<body>
<div class="card">
  <div class="eyebrow">Default card</div>
  <h4>$141A2E · 1px border · r20</h4>
  <p>Used for all non-featured surfaces. Hover brightens border to 16% white.</p>
</div>
<div class="card highlight">
  <div class="eyebrow">Highlighted card</div>
  <h4>1.5px Solana-gradient border</h4>
  <p>Reserved for featured items — primary plan, active remittance.</p>
</div>
</body>
</html>
