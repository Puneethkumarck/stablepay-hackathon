<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Type — Display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface-1); color: var(--fg-1); }
  .row { display:flex; align-items:baseline; gap: 16px; padding: 8px 0; border-bottom: 1px solid var(--border-1); }
  .row:last-child { border-bottom: 0; }
  .tag { font-family: var(--font-mono); color: var(--fg-3); font-size: 11px; width: 80px; flex-shrink: 0; }
</style>
</head>
<body>
<div class="row"><span class="tag">display</span><span class="sp-display">Send $100</span></div>
<div class="row"><span class="tag">h1 / 56</span><h1>Instant remittances</h1></div>
<div class="row"><span class="tag">h2 / 40</span><h2>On Solana</h2></div>
<div class="row"><span class="tag">h3 / 32</span><h3>Claim in minutes</h3></div>
</body>
</html>
