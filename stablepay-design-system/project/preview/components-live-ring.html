<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Status ring (hero mark)</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface-1); display:flex; gap: 36px; align-items: center; justify-content: center; }
  .ring { position: relative; width: 96px; height: 96px; }
  .ring .grad { position: absolute; inset: -3px; border-radius: 50%; background: conic-gradient(from 0deg, var(--solana-teal), var(--solana-purple), var(--solana-magenta), var(--solana-teal)); filter: blur(6px); opacity: 0.8; animation: spin 4s linear infinite; }
  .ring .inner { position: absolute; inset: 0; border-radius: 50%; background: var(--surface-2); border: 1px solid var(--border-2); display: grid; place-items: center; }
  .ring .inner svg { width: 42px; height: 42px; stroke: url(#grad); }
  @keyframes spin { to { transform: rotate(360deg); } }
  .meta { font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
  .meta b { color: var(--fg-1); display: block; font-family: var(--font-sans); font-size: 15px; margin-bottom: 4px; font-weight: 600; }
</style>
</head>
<body>
<div class="ring">
  <div class="grad"></div>
  <div class="inner">
    <svg viewBox="0 0 24 24" fill="none" stroke-width="1.8">
      <defs><linearGradient id="grad" x1="0" x2="1"><stop offset="0" stop-color="#00FFA3"/><stop offset="0.5" stop-color="#9945FF"/><stop offset="1" stop-color="#DC1FFF"/></linearGradient></defs>
      <path d="M6 12a6 6 0 0 1 6-6" stroke="url(#grad)" stroke-linecap="round"/>
      <path d="M12 18a6 6 0 0 0 6-6" stroke="url(#grad)" stroke-linecap="round"/>
      <circle cx="12" cy="12" r="2" fill="url(#grad)"/>
    </svg>
  </div>
</div>
<div class="meta"><b>Workflow in progress</b>Escrowed · awaiting claim</div>
</body>
</html>
