<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spacing scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface-1); color: var(--fg-1); }
  .row { display:flex; align-items:center; gap: 12px; margin-bottom: 6px; }
  .tag { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); width: 70px; }
  .bar { background: var(--solana-purple); height: 14px; border-radius: 3px; }
  .v { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); }
</style>
</head>
<body>
<div class="row"><span class="tag">--space-1</span><div class="bar" style="width:4px"></div><span class="v">4px</span></div>
<div class="row"><span class="tag">--space-2</span><div class="bar" style="width:8px"></div><span class="v">8px</span></div>
<div class="row"><span class="tag">--space-3</span><div class="bar" style="width:12px"></div><span class="v">12px</span></div>
<div class="row"><span class="tag">--space-4</span><div class="bar" style="width:16px"></div><span class="v">16px</span></div>
<div class="row"><span class="tag">--space-6</span><div class="bar" style="width:24px"></div><span class="v">24px</span></div>
<div class="row"><span class="tag">--space-8</span><div class="bar" style="width:32px"></div><span class="v">32px</span></div>
<div class="row"><span class="tag">--space-12</span><div class="bar" style="width:48px"></div><span class="v">48px</span></div>
<div class="row"><span class="tag">--space-16</span><div class="bar" style="width:64px"></div><span class="v">64px</span></div>
<div class="row"><span class="tag">--space-24</span><div class="bar" style="width:96px"></div><span class="v">96px</span></div>
</body>
</html>
