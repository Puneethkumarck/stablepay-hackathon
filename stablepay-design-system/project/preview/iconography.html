<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Iconography — Lucide</title>
<link rel="stylesheet" href="../colors_and_type.css">
<script src="https://unpkg.com/lucide@0.400.0/dist/umd/lucide.min.js"></script>
<style>
  body { padding: 24px; background: var(--surface-1); color: var(--fg-2); }
  .grid { display: grid; grid-template-columns: repeat(8, 1fr); gap: 12px; }
  .tile { aspect-ratio: 1; background: var(--surface-2); border: 1px solid var(--border-1); border-radius: var(--radius-md); display: grid; place-items: center; color: var(--fg-1); }
  .tile svg { width: 22px; height: 22px; stroke-width: 1.5; }
  .label { margin-top: 6px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-3); text-align: center; }
</style>
</head>
<body>
<div class="grid">
  <div><div class="tile"><i data-lucide="arrow-left-right"></i></div><div class="label">send</div></div>
  <div><div class="tile"><i data-lucide="wallet"></i></div><div class="label">wallet</div></div>
  <div><div class="tile"><i data-lucide="lock"></i></div><div class="label">escrow</div></div>
  <div><div class="tile"><i data-lucide="clock"></i></div><div class="label">pending</div></div>
  <div><div class="tile" style="color:var(--success)"><i data-lucide="check-circle-2"></i></div><div class="label">delivered</div></div>
  <div><div class="tile" style="color:var(--danger)"><i data-lucide="alert-triangle"></i></div><div class="label">error</div></div>
  <div><div class="tile"><i data-lucide="copy"></i></div><div class="label">copy</div></div>
  <div><div class="tile"><i data-lucide="qr-code"></i></div><div class="label">qr</div></div>
  <div><div class="tile"><i data-lucide="zap"></i></div><div class="label">fast</div></div>
  <div><div class="tile"><i data-lucide="shield-check"></i></div><div class="label">secure</div></div>
  <div><div class="tile"><i data-lucide="user-round"></i></div><div class="label">recipient</div></div>
  <div><div class="tile"><i data-lucide="message-square"></i></div><div class="label">sms</div></div>
  <div><div class="tile"><i data-lucide="refresh-cw"></i></div><div class="label">retry</div></div>
  <div><div class="tile"><i data-lucide="plus"></i></div><div class="label">add-funds</div></div>
  <div><div class="tile"><i data-lucide="chevron-right"></i></div><div class="label">next</div></div>
  <div><div class="tile"><i data-lucide="x"></i></div><div class="label">close</div></div>
</div>
<script>lucide.createIcons();</script>
</body>
</html>
