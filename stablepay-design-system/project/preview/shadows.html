<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shadows & glow</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 36px; background: var(--surface-1); display: grid; grid-template-columns: repeat(5, 1fr); gap: 20px; }
  .card { background: var(--surface-2); border: 1px solid var(--border-1); border-radius: var(--radius-lg); height: 110px; display: grid; place-items: end center; padding-bottom: 10px; font-family: var(--font-mono); font-size: 10px; color: var(--fg-2); }
</style>
</head>
<body>
<div class="card" style="box-shadow: var(--shadow-1)">shadow-1</div>
<div class="card" style="box-shadow: var(--shadow-2)">shadow-2</div>
<div class="card" style="box-shadow: var(--shadow-3)">shadow-3</div>
<div class="card" style="box-shadow: var(--glow-solana)">glow-solana</div>
<div class="card" style="box-shadow: var(--glow-teal)">glow-teal</div>
</body>
</html>
