<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Colors — Core palette</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface-1); }
  .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--border-1); }
  .sw .chip { height: 64px; }
  .sw .meta { padding: 8px 10px; background: var(--surface-2); font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); display: flex; justify-content: space-between; }
  .sw .meta b { color: var(--fg-1); font-weight: 500; }
</style>
</head>
<body>
<div class="grid">
  <div class="sw"><div class="chip" style="background:var(--surface-0)"></div><div class="meta"><b>surface-0</b><span>#070B1A</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-1)"></div><div class="meta"><b>surface-1</b><span>#0B1020</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-2)"></div><div class="meta"><b>surface-2</b><span>#141A2E</span></div></div>
  <div class="sw"><div class="chip" style="background:var(--surface-3)"></div><div class="meta"><b>surface-3</b><span>#1C2340</span></div></div>
  <div class="sw"><div class="chip" style="background:#FFFFFF"></div><div class="meta"><b>fg-1</b><span>#FFFFFF</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.72)"></div><div class="meta"><b>fg-2</b><span>72% wh</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.48)"></div><div class="meta"><b>fg-3</b><span>48% wh</span></div></div>
  <div class="sw"><div class="chip" style="background:rgba(255,255,255,0.28)"></div><div class="meta"><b>fg-4</b><span>28% wh</span></div></div>
</div>
</body>
</html>
