<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Status badges</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface-1); display:flex; flex-wrap: wrap; gap: 10px; align-items: flex-start; }
  .badge { font-family: var(--font-sans); font-size: 12px; font-weight: 600; padding: 6px 12px; border-radius: 999px; border: 1px solid; display: inline-flex; align-items: center; gap: 6px; letter-spacing: 0.01em; }
  .dot { width: 6px; height: 6px; border-radius: 50%; }
  .b-init { background: var(--info-soft); border-color: var(--info-border); color: #BAE6FD;}
  .b-esc { background: var(--accent-soft); border-color: var(--accent-border); color: #D6B4FF;}
  .b-claim { background: var(--warning-soft); border-color: var(--warning-border); color: #FCD34D;}
  .b-delivered { background: var(--success-soft); border-color: var(--success-border); color: #86EFAC;}
  .b-refund { background: rgba(148,163,184,0.12); border-color: rgba(148,163,184,0.3); color: #94A3B8;}
  .b-fail { background: var(--danger-soft); border-color: var(--danger-border); color: #FCA5A5;}
</style>
</head>
<body>
<span class="badge b-init"><span class="dot" style="background:var(--info)"></span>Initiated</span>
<span class="badge b-esc"><span class="dot" style="background:var(--accent)"></span>Escrowed</span>
<span class="badge b-claim"><span class="dot" style="background:var(--warning)"></span>Claimed</span>
<span class="badge b-delivered"><span class="dot" style="background:var(--success)"></span>Delivered</span>
<span class="badge b-refund"><span class="dot" style="background:#94A3B8"></span>Refunded</span>
<span class="badge b-fail"><span class="dot" style="background:var(--danger)"></span>Failed</span>
</body>
</html>
