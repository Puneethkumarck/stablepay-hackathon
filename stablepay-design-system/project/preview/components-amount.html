<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Amount display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface-1); display:flex; justify-content: space-around; align-items: center; gap: 20px; }
  .col { text-align: center; }
  .eyebrow { font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--fg-3); margin-bottom: 10px; }
  .amt { font-family: var(--font-mono); font-variant-numeric: tabular-nums; font-weight: 600; font-size: 48px; letter-spacing: -0.02em; line-height: 1; }
  .amt small { color: var(--fg-3); font-size: 22px; font-weight: 400; margin-right: 2px; }
  .arrow { font-family: var(--font-mono); font-size: 32px; color: var(--fg-3); }
  .out { color: #86EFAC; }
  .rate { font-family: var(--font-mono); color: var(--fg-3); font-size: 12px; margin-top: 8px; }
</style>
</head>
<body>
<div class="col">
  <div class="eyebrow">You send</div>
  <div class="amt"><small>$</small>100.00</div>
  <div class="rate">USDC · Solana</div>
</div>
<div class="arrow">→</div>
<div class="col">
  <div class="eyebrow">They receive</div>
  <div class="amt out"><small>₹</small>8,450.00</div>
  <div class="rate">84.50 INR / USD · locked</div>
</div>
</body>
</html>
