<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Buttons — Primary & Secondary</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { padding: 24px; background: var(--surface-1); display:flex; flex-direction: column; gap: 16px; }
  .row { display:flex; gap: 12px; align-items: center; flex-wrap: wrap; }
  .btn { font-family: var(--font-sans); font-weight: 600; font-size: 15px; padding: 12px 20px; border-radius: var(--radius-md); border: 0; cursor: pointer; display: inline-flex; align-items:center; gap: 8px; letter-spacing: -0.01em; }
  .btn-primary { color: #0B1020; background: var(--solana-gradient); box-shadow: var(--glow-solana-soft); }
  .btn-secondary { color: var(--fg-1); background: var(--surface-3); border: 1px solid var(--border-2); }
  .btn-ghost { color: var(--fg-2); background: transparent; }
  .btn-danger { color: #FFE5E5; background: var(--danger); }
  .btn-sm { padding: 8px 14px; font-size: 13px; }
  .btn-lg { padding: 16px 28px; font-size: 17px; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
</style>
</head>
<body>
<div class="row">
  <button class="btn btn-primary">Send $100.00</button>
  <button class="btn btn-secondary">Cancel</button>
  <button class="btn btn-ghost">Learn more</button>
  <button class="btn btn-danger">Refund</button>
</div>
<div class="row">
  <button class="btn btn-primary btn-sm">Send</button>
  <button class="btn btn-primary">Send</button>
  <button class="btn btn-primary btn-lg">Send</button>
  <button class="btn btn-primary" disabled>Send</button>
</div>
</body>
</html>
