<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>StablePay — Sender App UI Kit</title>
<link rel="stylesheet" href="styles.css">
<style>
  body { margin: 0; background: #050814; min-height: 100vh; display: grid; place-items: center; font-family: 'Space Grotesk', sans-serif; padding: 20px; }
  /* Scale device to fit viewport */
  #root { transform-origin: center top; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
<div id="root"></div>
<script>
// Scale device to always fit within viewport
function scaleDevice() {
  const root = document.getElementById('root');
  const vw = window.innerWidth - 40;
  const vh = window.innerHeight - 40;
  const scale = Math.min(vw / 402, vh / 874, 1);
  root.style.transform = scale < 1 ? `scale(${scale.toFixed(3)})` : '';
}
scaleDevice();
window.addEventListener('resize', scaleDevice);
</script>
<script type="text/babel" src="ios-frame.jsx"></script>
<script type="text/babel" src="Components.jsx"></script>
<script type="text/babel">
const { useState } = React;

function App() {
  const [screen, setScreen] = useState(localStorage.getItem('sp_screen') || 'auth');
  const [tab, setTab] = useState('home');
  const [amount, setAmount] = useState('100');
  const [phone, setPhone] = useState('+91 98765 43210');
  const [sending, setSending] = useState(false);
  const [sendStep, setSendStep] = useState(0);
  const [activeTxn, setActiveTxn] = useState(null);

  const go = (s) => { setScreen(s); localStorage.setItem('sp_screen', s); };

  const runSend = () => {
    setSending(true);
    go('sending'); setSendStep(0);
    const tick = (n) => setTimeout(() => setSendStep(n), n * 900);
    tick(1); tick(2); tick(3);
    setTimeout(() => setSending(false), 2800);
  };

  let content;
  if (screen === 'auth') content = <AuthScreen onSignIn={() => go('home')}/>;
  else if (screen === 'send-amount') content = <SendAmount amount={amount} setAmount={setAmount} onBack={() => go('home')} onNext={() => go('send-recipient')}/>;
  else if (screen === 'send-recipient') content = <SendRecipient phone={phone} setPhone={setPhone} onBack={() => go('send-amount')} onNext={() => go('send-review')}/>;
  else if (screen === 'send-review') content = <SendReview amount={amount} phone={phone} sending={sending} onBack={() => go('send-recipient')} onSend={runSend}/>;
  else if (screen === 'sending') content = <SendingScreen amount={amount} phone={phone} onDone={() => go('home')}/>;
  else if (screen === 'detail') content = <DetailScreen txn={activeTxn} onBack={() => go('home')}/>;
  else if (screen === 'add-funds') content = <AddFundsScreen onBack={() => go('home')} onDone={() => go('home')}/>;
  else if (screen === 'activity') content = <ActivityScreen onOpen={(t) => { setActiveTxn(t); go('detail'); }}/>;
  else if (screen === 'me') content = <MeScreen onSignOut={() => { localStorage.removeItem('sp_screen'); go('auth'); }}/>;
  else content = <HomeScreen onSend={() => go('send-amount')} onAdd={() => go('add-funds')} onOpen={(t) => { setActiveTxn(t); go('detail'); }}/>;

  const showTabs = !['auth','send-amount','send-recipient','send-review','sending'].includes(screen);

  return (
    <IOSDevice dark={true}>
      <GradDefs/>
      <div className="sp-app">
        {content}
        {showTabs && <TabBar active={screen==='send-amount'?'send':['activity','me','detail'].includes(screen)?screen:'home'}
        onChange={(k) => { setTab(k); if(k==='send') go('send-amount'); else if(k==='activity') go('activity'); else if(k==='me') go('me'); else go('home'); }}/>}
      </div>
    </IOSDevice>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
