spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.data.redis.autoconfigure.RedisAutoConfiguration
      - org.springframework.boot.data.redis.autoconfigure.RedisRepositoriesAutoConfiguration
  cache:
    type: none
  flyway:
    enabled: true
    locations: classpath:db/migration
  jpa:
    hibernate:
      ddl-auto: validate

stablepay:
  kms:
    enabled: false
  jwt:
    secret: test-jwt-secret-must-be-at-least-32-bytes-long!!
    access-ttl: PT15M
    refresh-ttl: P30D
  auth:
    google:
      client-ids:
        - test-google-client-id.apps.googleusercontent.com
  mpc:
    enabled: false
  stripe:
    api-key: sk_test_stablepay
    webhook-secret: whsec_test_stablepay
    test-mode: true
    auto-confirm: true
    currency: usd
