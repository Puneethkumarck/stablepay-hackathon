spring:
  application:
    name: stablepay
  autoconfigure:
    exclude:
      - io.temporal.spring.boot.autoconfigure.TemporalAutoConfiguration
  cache:
    type: redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 2000ms
      connect-timeout: 2000ms
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: 1000ms
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/stablepay}
    username: ${DATABASE_USERNAME:stablepay}
    password: ${DATABASE_PASSWORD:stablepay}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

stablepay:
  fx:
    api:
      base-url: https://open.er-api.com
  mpc:
    sidecar:
      host: ${MPC_SIDECAR_HOST:localhost}
      port: ${MPC_SIDECAR_PORT:50051}
      deadline-ms: ${MPC_SIDECAR_DEADLINE_MS:30000}
  solana:
    rpc-url: ${SOLANA_RPC_URL:https://api.devnet.solana.com}
    escrow-program-id: ${STABLEPAY_ESCROW_PROGRAM_ID:7C2zsbhgDnxQuC1Nd2rzXQfsfnKazQWFpoUJNqS8zWij}
    usdc-mint: ${USDC_MINT:4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU}
    claim-authority-private-key: ${CLAIM_AUTHORITY_PRIVATE_KEY:}
  treasury:
    private-key: ${TREASURY_PRIVATE_KEY:}
  stripe:
    api-key: ${STRIPE_API_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    test-mode: ${STRIPE_TEST_MODE:false}
    auto-confirm: ${STRIPE_AUTO_CONFIRM:false}
    test-payment-method: ${STRIPE_TEST_PAYMENT_METHOD:pm_card_visa}
    currency: ${STRIPE_CURRENCY:usd}
  transak:
    enabled: ${TRANSAK_ENABLED:false}
    api-key: ${TRANSAK_API_KEY:}
    api-secret: ${TRANSAK_API_SECRET:}
    base-url: ${TRANSAK_BASE_URL:https://staging-api.transak.com}
  twilio:
    enabled: ${TWILIO_ENABLED:false}
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    phone-number: ${TWILIO_PHONE_NUMBER:}
  temporal:
    workflow-execution-timeout: PT48H
    workflow-run-timeout: PT2H
    claim-expiry-timeout: PT48H
    claim-base-url: https://claim.stablepay.app/
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8081
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Content-Type
      - Authorization
    max-age: 3600

logging:
  level:
    com.stablepay: ${LOG_LEVEL:INFO}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    tags-sorter: alpha
    operations-sorter: method
  packages-to-scan: com.stablepay.application.controller

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  health:
    redis:
      enabled: true

resilience4j:
  retry:
    instances:
      mpcKeygen:
        max-attempts: 3
        wait-duration: 2s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 1.5
        retry-exceptions:
          - com.stablepay.domain.wallet.exception.MpcKeyGenerationException$Transient
        ignore-exceptions:
          - com.stablepay.domain.wallet.exception.MpcKeyGenerationException$Permanent
