spring:
  application:
    name: stablepay
  autoconfigure:
    exclude:
      - io.temporal.spring.boot.autoconfigure.TemporalAutoConfiguration
  cache:
    type: redis
    redis:
      time-to-live: 60s
  datasource:
    url: jdbc:postgresql://localhost:5432/stablepay
    username: stablepay
    password: stablepay
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

stablepay:
  fx:
    api:
      base-url: https://open.er-api.com
  mpc:
    sidecar:
      host: ${MPC_SIDECAR_HOST:localhost}
      port: ${MPC_SIDECAR_PORT:50051}
      deadline-ms: ${MPC_SIDECAR_DEADLINE_MS:30000}
  solana:
    rpc-url: https://api.devnet.solana.com
    escrow-program-id: ${STABLEPAY_ESCROW_PROGRAM_ID:11111111111111111111111111111111}
    usdc-mint: ${USDC_MINT:4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU}
    claim-authority-private-key: ${CLAIM_AUTHORITY_PRIVATE_KEY:}
  twilio:
    enabled: ${TWILIO_ENABLED:false}
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    phone-number: ${TWILIO_PHONE_NUMBER:}
  temporal:
    workflow-execution-timeout: PT48H
    workflow-run-timeout: PT2H
    claim-expiry-timeout: PT48H
    claim-base-url: https://claim.stablepay.app/
  cors:
    allowed-origins:
      - http://localhost:3000
      - http://localhost:8081
    allowed-methods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
    allowed-headers:
      - Content-Type
      - Authorization
    max-age: 3600

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
