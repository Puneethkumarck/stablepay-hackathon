spring:
  application:
    name: stablepay
  autoconfigure:
    exclude:
      - io.temporal.spring.boot.autoconfigure.TemporalAutoConfiguration
  cache:
    type: redis
    redis:
      time-to-live: 60s
  datasource:
    url: jdbc:postgresql://localhost:5432/stablepay
    username: stablepay
    password: stablepay
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

stablepay:
  fx:
    api:
      base-url: https://open.er-api.com
  temporal:
    workflow-execution-timeout: PT48H
    workflow-run-timeout: PT2H
    claim-expiry-timeout: PT48H
    claim-base-url: https://claim.stablepay.app/

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
