spring:
  application:
    name: stablepay
  cache:
    type: redis
    redis:
      time-to-live: 60s
  datasource:
    url: jdbc:postgresql://localhost:5432/stablepay
    username: stablepay
    password: stablepay
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080

stablepay:
  fx:
    api:
      base-url: https://open.er-api.com

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
