services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: stablepay
      POSTGRES_USER: stablepay
      POSTGRES_PASSWORD: stablepay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stablepay"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.29.5
    ports:
      - "7233:7233"
    environment:
      DB: postgres12_pgx
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: stablepay
      POSTGRES_PWD: stablepay
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.48.1
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mpc-sidecar-0:
    build:
      context: ./mpc-sidecar
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
      - "7000:7000"
    environment:
      PARTY_ID: 0
      GRPC_PORT: 50051
      P2P_PORT: 7000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  mpc-sidecar-1:
    build:
      context: ./mpc-sidecar
      dockerfile: Dockerfile
    ports:
      - "50052:50051"
      - "7001:7000"
    environment:
      PARTY_ID: 1
      GRPC_PORT: 50051
      P2P_PORT: 7000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: stablepay-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: sandbox
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: stablepay
      DB_USER: stablepay
      DB_PASSWORD: stablepay
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TEMPORAL_ADDRESS: temporal:7233
      MPC_SIDECAR_HOST: mpc-sidecar-0
      MPC_SIDECAR_PORT: 50051
      STABLEPAY_MPC_PARTY_ID: 0
      STABLEPAY_MPC_THRESHOLD: 2
      STABLEPAY_MPC_TOTAL_PARTIES: 2
      STABLEPAY_MPC_PEER_ADDRESSES: 1=mpc-sidecar-1:7000
      STABLEPAY_MPC_PEER_SIDECARS: 1=mpc-sidecar-1:50051:mpc-sidecar-0:7000
      STABLEPAY_ESCROW_PROGRAM_ID: 7C2zsbhgDnxQuC1Nd2rzXQfsfnKazQWFpoUJNqS8zWij
      CLAIM_AUTHORITY_PRIVATE_KEY: ${CLAIM_AUTHORITY_PRIVATE_KEY}
      SOLANA_RPC_URL: ${SOLANA_RPC_URL:-https://api.devnet.solana.com}
      USDC_MINT: ${USDC_MINT:-4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
      mpc-sidecar-0:
        condition: service_healthy
      mpc-sidecar-1:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

volumes:
  postgres_data:
