services:
  postgres:
    image: postgres:18-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: stablepay
      POSTGRES_USER: stablepay
      POSTGRES_PASSWORD: stablepay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stablepay"]
      interval: 5s
      timeout: 5s
      retries: 5

  temporal:
    image: temporalio/auto-setup:1.29.6
    ports:
      - "7233:7233"
    environment:
      DB: postgres12_pgx
      DB_PORT: 5432
      POSTGRES_SEEDS: postgres
      POSTGRES_USER: stablepay
      POSTGRES_PWD: stablepay
    depends_on:
      postgres:
        condition: service_healthy

  temporal-ui:
    image: temporalio/ui:2.49.1
    ports:
      - "8088:8080"
    environment:
      TEMPORAL_ADDRESS: temporal:7233

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  wiremock:
    image: wiremock/wiremock:3.9.2
    ports:
      - "8089:8080"
    volumes:
      - ./wiremock/mappings:/home/wiremock/mappings:ro
    command: ["--global-response-templating", "--verbose"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/__admin/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  mpc-sidecar-0:
    build:
      context: ./mpc-sidecar
      dockerfile: Dockerfile
    ports:
      - "50051:50051"
      - "7000:7000"
    environment:
      PARTY_ID: 0
      GRPC_PORT: 50051
      P2P_PORT: 7000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  mpc-sidecar-1:
    build:
      context: ./mpc-sidecar
      dockerfile: Dockerfile
    ports:
      - "50052:50051"
      - "7001:7000"
    environment:
      PARTY_ID: 1
      GRPC_PORT: 50051
      P2P_PORT: 7000
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 50051 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    image: stablepay-backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: sandbox
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: stablepay
      DB_USER: stablepay
      DB_PASSWORD: stablepay
      REDIS_HOST: redis
      REDIS_PORT: 6379
      TEMPORAL_ADDRESS: temporal:7233
      MPC_SIDECAR_HOST: mpc-sidecar-0
      MPC_SIDECAR_PORT: 50051
      STABLEPAY_MPC_PARTY_ID: 0
      STABLEPAY_MPC_THRESHOLD: 2
      STABLEPAY_MPC_TOTAL_PARTIES: 2
      STABLEPAY_MPC_PEER_ADDRESSES: 1=mpc-sidecar-1:7000
      STABLEPAY_MPC_PEER_SIDECARS: 1=mpc-sidecar-1:50051:mpc-sidecar-0:7000
      STABLEPAY_ESCROW_PROGRAM_ID: 7C2zsbhgDnxQuC1Nd2rzXQfsfnKazQWFpoUJNqS8zWij
      CLAIM_AUTHORITY_PRIVATE_KEY: 2JxcWkDJuBPCexd2hyWpZ3HXMBQLDkWWGWuRzkHmDvqoBNBBqC9jsnr1d5bznamozwVrrj7A5hLomkHhZYaP6SbY
      STRIPE_API_KEY: ${STRIPE_API_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_TEST_MODE: ${STRIPE_TEST_MODE:-false}
      STRIPE_AUTO_CONFIRM: ${STRIPE_AUTO_CONFIRM:-false}
      STRIPE_TEST_PAYMENT_METHOD: ${STRIPE_TEST_PAYMENT_METHOD:-pm_card_visa}
      TREASURY_PRIVATE_KEY: ${TREASURY_PRIVATE_KEY}
      STABLEPAY_DISBURSEMENT_PROVIDER: ${STABLEPAY_DISBURSEMENT_PROVIDER:-logging}
      RAZORPAY_KEY_ID: ${RAZORPAY_KEY_ID:-}
      RAZORPAY_KEY_SECRET: ${RAZORPAY_KEY_SECRET:-}
      RAZORPAY_ACCOUNT_NUMBER: ${RAZORPAY_ACCOUNT_NUMBER:-}
      GOOGLE_ANDROID_CLIENT_ID: ${GOOGLE_ANDROID_CLIENT_ID:-placeholder-client-id}
      RAZORPAY_BASE_URL: ${RAZORPAY_BASE_URL:-http://wiremock:8080}
      RAZORPAY_REQUEST_TIMEOUT: ${RAZORPAY_REQUEST_TIMEOUT:-PT10S}
      TWILIO_ENABLED: ${TWILIO_ENABLED:-false}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER:-}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      temporal:
        condition: service_started
      mpc-sidecar-0:
        condition: service_healthy
      mpc-sidecar-1:
        condition: service_healthy
      wiremock:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  web-app:
    image: stablepay-web-app:latest
    build:
      context: ./web-app
      dockerfile: Dockerfile
      args:
        STABLEPAY_BACKEND_URL: http://backend:8080
        NEXT_PUBLIC_API_URL: http://localhost:3000
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
    ports:
      - "3000:3000"
    environment:
      STABLEPAY_BACKEND_URL: http://backend:8080
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      NEXT_PUBLIC_API_URL: http://localhost:3000
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-placeholder}
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  postgres_data:
