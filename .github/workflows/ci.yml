name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  JAVA_VERSION: '25'
  GRADLE_OPTS: >-
    -Dorg.gradle.daemon=false
    -Dorg.gradle.parallel=true
    -Dorg.gradle.caching=true
  SOLANA_VERSION: '2.2.7'
  ANCHOR_VERSION: '0.32.1'
  NODE_VERSION: '22'

jobs:
  lint:
    name: Spotless Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew spotlessCheck

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew test
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: unit-test-results
          path: |
            backend/build/reports/tests/test/
            backend/build/test-results/test/
          retention-days: 14

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 15
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew integrationTest
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: integration-test-results
          path: |
            backend/build/reports/tests/integrationTest/
            backend/build/test-results/integrationTest/
          retention-days: 14

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [unit-test, integration-test]
    timeout-minutes: 10
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
      - uses: gradle/actions/setup-gradle@v6
      - run: ./gradlew assemble

  anchor-build:
    name: Anchor Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: metadaoproject/setup-anchor@v3.1
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}
          solana-cli-version: ${{ env.SOLANA_VERSION }}
      - run: anchor build

  anchor-test:
    name: Anchor Tests
    runs-on: ubuntu-latest
    needs: anchor-build
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - uses: metadaoproject/setup-anchor@v3.1
        with:
          anchor-version: ${{ env.ANCHOR_VERSION }}
          solana-cli-version: ${{ env.SOLANA_VERSION }}
      - run: solana-keygen new --no-bip39-passphrase
      - run: anchor test
